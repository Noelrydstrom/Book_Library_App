<div class="container mt-5">

    <h2>Books</h2>

    <table class="table table-striped">

        <thead>

            <tr>

                <th>Title</th>
                <th>Author</th>
                <th>Publish Date</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let book of books">

                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.publishDate | date }}</td>

            </tr>

        </tbody>

    </table>

</div>
