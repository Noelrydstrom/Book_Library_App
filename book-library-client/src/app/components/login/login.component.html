<div class="container mt-5" style="max-width:400px;">

    <h2 class="mb-4">Login</h2>

    <div class="mb-3">
        <input
            type="text"
            class="form-control"
            placeholder="Username"
            [(ngModel)]="username">
    </div>

    <div class="mb-3">
        <input
            type="password"
            class="form-control"
            placeholder="Password"
            [(ngModel)]="password">
    </div>

    <button
        class="btn btn-primary w-100"
        (click)="login()">

        Login

    </button>

</div>
